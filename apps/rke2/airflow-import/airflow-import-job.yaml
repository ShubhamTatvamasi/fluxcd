---
# Job specs are immutable, so Kubernetes/Flux can't update this Job in place
# when airflow-variables-import-* or airflow-connections-import-* changes.
# After editing that import data, manually run:
#   kubectl delete job airflow-import -n <namespace>
# so Flux can recreate it and re-run the import against the new data.
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-import
  namespace: ${namespace}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      name: airflow-import
    spec:
      restartPolicy: Never
      containers:
        - name: import
          image: apache/airflow:3.3.0
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              airflow db check
              airflow variables import /opt/airflow/import/variables.yaml
              airflow connections import --overwrite /opt/airflow/import/connections.yaml
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-metadata-connection
                  key: connection
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: airflow-fernet-key
                  key: fernet-key
          volumeMounts:
            - name: variables
              mountPath: /opt/airflow/import/variables.yaml
              subPath: variables.yaml
              readOnly: true
            - name: connections
              mountPath: /opt/airflow/import/connections.yaml
              subPath: connections.yaml
              readOnly: true
      volumes:
        - name: variables
          configMap:
            name: airflow-variables-import
        - name: connections
          secret:
            secretName: airflow-connections-import
