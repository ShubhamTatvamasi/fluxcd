---
# Name must change whenever airflow-variables-import-* or
# airflow-connections-import-* is bumped, since Job specs are immutable and
# Kubernetes refuses to update a completed Job in place.
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-import-v1
  namespace: ${namespace}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      name: airflow-import
    spec:
      restartPolicy: Never
      containers:
        - name: import
          image: apache/airflow:3.3.0
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              airflow db check
              airflow variables import /opt/airflow/import/variables.json
              airflow connections import /opt/airflow/import/connections.json
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-metadata-connection
                  key: connection
          volumeMounts:
            - name: variables
              mountPath: /opt/airflow/import/variables.json
              subPath: variables.json
              readOnly: true
            - name: connections
              mountPath: /opt/airflow/import/connections.json
              subPath: connections.json
              readOnly: true
      volumes:
        - name: variables
          configMap:
            name: airflow-variables-import-v1
        - name: connections
          secret:
            secretName: airflow-connections-import-v1
