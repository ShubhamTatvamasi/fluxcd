---
# Bump the `name` suffix (v1 -> v2 -> ...) whenever connections.json changes.
# The import Job references this name directly, so a new name = a new Job = a
# fresh import run. Leaving the name unchanged means the Job never re-runs.
#
# To (re)generate this SealedSecret:
#   1. Write the plaintext connections.json locally (never commit it), e.g.:
#      {
#        "my_harbor": {"conn_type": "docker", "host": "...", "login": "...", "password": "..."},
#        "my_postgres": {"conn_type": "postgres", "host": "...", "login": "...", "password": "...", "schema": "..."},
#        "my_vm": {"conn_type": "generic", "host": "...", "login": "...", "password": "..."}
#      }
#   2. kubectl create secret generic airflow-connections-import-v1 \
#        --namespace airflow \
#        --from-file=connections.json=./connections.json \
#        --dry-run=client -o yaml > /tmp/secret.yaml
#   3. kubeseal --cluster-wide -o yaml < /tmp/secret.yaml > airflow-connections-import-sealedsecret.yaml
#   4. Add the `template.metadata.annotations` block back in (kubeseal strips it) and rm /tmp/secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: airflow-connections-import-v1
  namespace: ${namespace}
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
spec:
  encryptedData:
    connections.json: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: airflow-connections-import-v1
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
