---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: airflow-infrastructure
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infrastructure/base/airflow/infrastructure
  prune: true
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substitute:
      domain: k8s.shubhamtatvamasi.com
