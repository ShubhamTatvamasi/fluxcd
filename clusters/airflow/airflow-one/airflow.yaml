---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: airflow-one
  namespace: airflow-one
spec:
  inputs:
    - service: "airflow-base"
      path: "./infrastructure/airflow/base"
      dependsOn: ~
      workers_replicas: ~
    - service: "postgres"
      path: "./infrastructure/airflow/postgres"
      dependsOn: "airflow-base"
      workers_replicas: ~
    - service: "airflow"
      path: "./infrastructure/airflow/airflow"
      dependsOn: "postgres"
      workers_replicas: "1"
  resources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: << inputs.service >>
        namespace: airflow-one
      spec:
        interval: 10m0s
        path: << inputs.path >>
        prune: true
        wait: true
        timeout: 10m
        sourceRef:
          kind: GitRepository
          name: flux-system
          namespace: flux-system
        postBuild:
          substitute:
            namespace: airflow-one
            workers_replicas: << inputs.workers_replicas >>
        dependsOn:
          - name: << inputs.dependsOn >>
