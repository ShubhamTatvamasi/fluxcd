---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: airflow-two
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infrastructure/airflow/resourceset
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substitute:
      namespace: airflow-two
      workers_replicas: "2"
