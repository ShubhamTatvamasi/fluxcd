---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: airflow-two
  namespace: airflow-two
spec:
  inputs:
    - service: "airflow-base"
      path: "./infrastructure/airflow/base"
    - service: "postgres"
      path: "./infrastructure/airflow/postgres"
      dependsOn: "airflow-base"
    - service: "airflow"
      path: "./infrastructure/airflow/airflow"
      dependsOn: "postgres"
      workers_replicas: "2"
  resourcesTemplate: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: << inputs.service >>
      namespace: airflow-two
    spec:
      interval: 10m0s
      path: << inputs.path >>
      prune: true
      wait: true
      timeout: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      postBuild:
        substitute:
          namespace: airflow-two
      <<- if inputs.workers_replicas >>
          workers_replicas: "<< inputs.workers_replicas >>"
      <<- end >>
      <<- if inputs.dependsOn >>
      dependsOn:
        - name: << inputs.dependsOn >>
      <<- end >>
