---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: airflow
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: postgres
    namespace: airflow-base
  install:
    timeout: 10m
    remediation:
      retries: 3
    disableWait: false
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
    disableWait: false
  values:
    auth:
      password: "postgres"
