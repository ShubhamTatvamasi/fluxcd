---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airflow
  namespace: ${namespace}
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: airflow
    namespace: ${namespace}
  install:
    timeout: 10m
    remediation:
      retries: 3
    disableWait: false
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
    disableWait: false
  values:
    airflowVersion: "3.2.1"
    # defaultAirflowTag: "3.2.1"
    defaultAirflowTag: "3.2.1-1"
    defaultAirflowRepository: "shubhamtatvamasi/airflow"
    executor: "KubernetesExecutor"
    postgresql:
      enabled: false
    opensearch:
      enabled: true
      connection:
        scheme: http
        # user: "admin"
        # pass: "StrongPassword123!"
        host: "opensearch-cluster-master.opensearch"
        port: 9200
    config:
      logging:
        remote_log_conn_id: "opensearch_default"
      opensearch:
        host: "http://opensearch-cluster-master.opensearch"
        port: 9200
        write_to_os: 'True'
        json_format: 'True'
        write_stdout: 'False'
      opensearch_configs:
        use_ssl: 'False'
        verify_certs: 'False'
        ssl_assert_hostname: 'False'
      elasticsearch: ~
      elasticsearch_configs: ~
      # elasticsearch:
      #   host: "http://opensearch-cluster-master.opensearch:9200"
      #   log_id_template: "{dag_id}_{task_id}_{run_id}_{try_number}"
      #   json_format: 'True'
      #   verify_certs: 'False'
      # elasticsearch_configs:
      #   use_ssl: 'False'
      #   verify_certs: 'False'
    # extraEnv: |
    #   - name: AIRFLOW__OPENSEARCH__PORT
    #     value: '9200'
    # ports:
    #   apiServer: 80
    #   airflowUI: 80
    apiServer:
      service:
        type: LoadBalancer
    migrateDatabaseJob:
      useHelmHooks: false
    createUserJob:
      useHelmHooks: false
    workers:
      replicas: ${workers_replicas}
    data:
      metadataConnection:
        host: postgres
    images:
      gitSync:
        tag: v4.6.0
    dags:
      gitSync:
        enabled: ${dags_git_sync_enabled}
        credentialsSecret: git-credentials
        repo: ${dags_git_repo}
        branch: ${dags_git_branch}
        ref: ${dags_git_branch}
        subPath: ${dags_git_subpath}
