---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airflow
  namespace: ${namespace}
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: airflow
    namespace: ${namespace}
  install:
    timeout: 10m
    remediation:
      retries: 3
    disableWait: false
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
    disableWait: false
  values:
    airflowVersion: "3.2.0"
    defaultAirflowTag: "3.2.0"
    executor: "CeleryExecutor"
    postgresql:
      enabled: false
    apiServer:
      service:
        type: LoadBalancer
    migrateDatabaseJob:
      useHelmHooks: false
    createUserJob:
      useHelmHooks: false
    workers:
      replicas: ${workers_replicas}
    data:
      metadataConnection:
        host: postgres
    dags:
      gitSync:
        enabled: ${dags_git_sync_enabled}
        credentialsSecret: git-credentials
        repo: ${dags_git_repo}
        branch: ${dags_git_branch}
        subPath: ${dags_git_subpath}
