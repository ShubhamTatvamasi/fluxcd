---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: traefik
    namespace: traefik
  values:
    service:
      annotations:
        metallb.io/loadBalancerIPs: 10.10.10.16
    accessLog:
      enabled: true
      # JSON format so Loki/Alloy can parse fields (status, path, duration).
      format: json
      fields:
        headers:
          defaultMode: keep
    metrics:
      prometheus:
        service:
          enabled: true
        # ServiceMonitor is created separately (see ../monitoring), since its CRD
        # comes from kube-prometheus-stack, which itself depends on traefik.
        serviceMonitor:
          enabled: false
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
      kubernetesGateway:
        enabled: true
    gateway:
      listeners:
        web:
          port: 8000
          protocol: HTTP
          namespacePolicy:
            from: All
        websecure:
          port: 8443
          protocol: HTTPS
          namespacePolicy:
            from: All
          certificateRefs:
            - name: traefik-tls
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.${domain}`)
        entryPoints:
          - websecure
        middlewares:
          - name: oauth2-proxy-errors
            namespace: traefik
          - name: oauth2-proxy-auth
            namespace: traefik
        tls:
          secretName: traefik-tls
