---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer-ce
  namespace: portainer
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: portainer
    namespace: portainer
  values:
    image:
      # Stable
      # repository: portainer/portainer-ce
      # tag: 2.43.0
      # Development
      repository: portainerci/portainer-ce
      tag: develop
    trusted_origins:
      enabled: true
      domains: https://portainer-ce.${domain},https://edge-portainer-ce.${domain}
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: portainer-ce.${domain}
          paths:
            - path: /
        - host: edge-portainer-ce.${domain}
          paths:
            - path: /
              port: 8000
      tls:
        - secretName: portainer-tls
          hosts:
            - portainer-ce.${domain}
            - edge-portainer-ce.${domain}
    tls:
      existingSecret: portainer-tls
    persistence:
      annotations:
        helm.sh/resource-policy: keep
