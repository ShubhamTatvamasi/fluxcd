---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer
  namespace: portainer
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: portainer
    namespace: portainer
  values:
    enterpriseEdition:
      enabled: true
      image:
        # Development
        repository: portainerci/portainer-ee
        tag: develop
        # Feature
        # repository: harbor.${domain}/portainer/portainer-ee
        # tag: node-shell
        # tag: new-custom-resources
    trusted_origins:
      enabled: true
      domains: https://portainer.${domain}
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: portainer.${domain}
          paths:
            - path: /
      tls:
        - secretName: portainer-tls
          hosts:
            - portainer.${domain}
    tls:
      existingSecret: portainer-tls
    persistence:
      annotations:
        helm.sh/resource-policy: keep
  # The chart renders --trusted-origins with helm `quote`, producing
  # --trusted-origins="https://..." where the literal double-quotes become
  # part of the value and Portainer rejects it as an invalid origin URL.
  # Strip the quotes from the rendered arg, and append --kubectl-shell-image
  # (the chart has no value for it) so the node-shell EE image is used.
  # postRenderers:
  # - kustomize:
  #     patches:
  #     - target:
  #         kind: Deployment
  #         name: portainer
  #       patch: |
  #         - op: add
  #           path: /spec/template/spec/containers/0/args/-
  #           value: "--kubectl-shell-image=portainer/kubectl-shell:2.39.3"
