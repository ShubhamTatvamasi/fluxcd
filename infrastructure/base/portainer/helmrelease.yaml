---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer
  namespace: portainer
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: portainer
    namespace: portainer
  values:
    enterpriseEdition:
      enabled: true
      image:
        repository: harbor.k8s.shubhamtatvamasi.com/portainer/portainer-ee
        tag: node-shell
    trusted_origins:
      enabled: true
      domains: portainer.k8s.shubhamtatvamasi.com
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: portainer.k8s.shubhamtatvamasi.com
          paths:
            - path: /
      tls:
        - secretName: portainer-tls
          hosts:
            - portainer.k8s.shubhamtatvamasi.com
    tls:
      existingSecret: portainer-tls
    persistence:
      annotations:
        helm.sh/resource-policy: keep
  # The chart renders --trusted-origins with helm `quote`, producing
  # --trusted-origins="https://..." where the literal double-quotes become
  # part of the value and Portainer rejects it as an invalid origin URL.
  # Strip the quotes from the rendered arg. The `test` op guards against the
  # arg index shifting (the patch fails loudly instead of editing the wrong arg).
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: Deployment
          name: portainer
        patch: |
          - op: replace
            path: /spec/template/spec/containers/0/args/2
            value: "--trusted-origins=portainer.k8s.shubhamtatvamasi.com"
