---
# Auto-discovered by the Grafana sidecar (kube-prometheus-stack) via the
# `grafana_datasource` label. Registers Loki as a Grafana datasource so logs
# can be queried with LogQL in Explore / dashboards.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.loki.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000
