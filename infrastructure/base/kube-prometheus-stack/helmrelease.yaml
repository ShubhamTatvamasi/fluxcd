---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
    namespace: monitoring
  values:
    prometheus:
      # service:
      #   type: LoadBalancer
      prometheusSpec:
        serviceMonitorNamespaceSelector:
          matchLabels:
            monitoring: enabled
        # Ship all scraped metrics to Mimir for long-term storage. Mimir's
        # push API is fronted by the mimir-gateway service.
        remoteWrite:
          - url: http://mimir-gateway.mimir.svc.cluster.local/api/v1/push
            headers:
              X-Scope-OrgID: anonymous
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - prometheus.${domain}
        tls:
          - secretName: kube-prometheus-stack-tls
            hosts:
              - prometheus.${domain}
    grafana:
      # service:
      #   type: LoadBalancer
      adminUser: admin
      adminPassword: admin
      # Logs Drilldown app (Metrics/Traces/Profiles Drilldown ship by default).
      plugins:
        - grafana-lokiexplore-app
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - grafana.${domain}
        tls:
          - secretName: kube-prometheus-stack-tls
            hosts:
              - grafana.${domain}
