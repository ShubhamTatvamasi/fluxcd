---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: prometheus
spec:
  interval: 5m
  chart:
    spec:
      chart: prometheus
      version: "28.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus
  values:
    server:
      image:
        tag: "v3.11.0"
