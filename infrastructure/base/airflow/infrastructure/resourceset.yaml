---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: airflow-infrastructure
  namespace: flux-system
spec:
  inputs:
    # log/search store + its web UI, both in the opensearch namespace (its
    # Certificates need cert-manager's ClusterIssuer; the admin-credentials
    # secret needs sealed-secrets to decrypt).
    - service: "opensearch"
      path: "./infrastructure/base/opensearch"
      dependsOn:
        - "cert-manager-config"
        - "sealed-secrets"

    # grafana dashboard for airflow (ConfigMap picked up by kube-prometheus-stack)
    - service: "airflow-dashboard"
      path: "./infrastructure/base/airflow/airflow-dashboard"
      dependsOn:
        - "kube-prometheus-stack"

    # cnpg operator (installs the postgresql.cnpg.io CRDs)
    - service: "cnpg-operator"
      path: "./infrastructure/base/cnpg/operator"

    # basic-auth credentials for the cnpg cluster (sealed secret)
    - service: "airflow-basic-auth"
      path: "./secrets/airflow/cnpg-system"
      dependsOn:
        - "sealed-secrets"

    # cnpg cluster + pooler + database (needs the operator CRDs and the secret)
    - service: "cnpg-cluster"
      path: "./infrastructure/base/cnpg/cluster"
      dependsOn:
        - "cnpg-operator"
        - "airflow-basic-auth"

    # KEDA provides event-driven autoscaling (installs the keda.sh CRDs), used by
    # Airflow's Celery worker ScaledObject to scale workers on queued task count
    - service: "keda"
      path: "./infrastructure/base/keda"
  resourcesTemplate: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: << inputs.service >>
      namespace: flux-system
    spec:
      interval: 10m0s
      path: << inputs.path >>
      prune: true
      wait: true
      timeout: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system

      <<- if index inputs "dependsOn" >>
      dependsOn:
        <<- range index inputs "dependsOn" >>
        - name: << . >>
          namespace: flux-system
        <<- end >>
      <<- end >>

      postBuild:
        substitute:
          domain: ${domain}
