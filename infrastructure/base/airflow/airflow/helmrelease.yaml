---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airflow
  namespace: ${namespace}
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: airflow
    namespace: ${namespace}
  values:
    airflowVersion: "3.3.0"
    # defaultAirflowTag: "3.3.0"
    defaultAirflowTag: "3.3.0-1"
    defaultAirflowRepository: "shubhamtatvamasi/airflow"
    executor: "KubernetesExecutor"
    workers:
      kubernetes:
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "2Gi"
    postgresql:
      enabled: false
    opensearch:
      enabled: true
      connection:
        scheme: http
        host: "opensearch-cluster-master.opensearch"
        port: 9200
        # user: "admin"
        # pass: "StrongPassword123!"
    config:
      core:
        test_connection: 'Enabled'
      webserver:
        expose_config: 'True'
        update_fab_perms: 'True'
      logging:
        delete_local_logs: 'False'
      opensearch:
        host: "http://opensearch-cluster-master.opensearch"
        port: 9200
        write_to_os: 'True'
        json_format: 'True'
        write_stdout: 'False'
      opensearch_configs:
        use_ssl: 'False'
        verify_certs: 'False'
        ssl_assert_hostname: 'False'
      elasticsearch: ~
      elasticsearch_configs: ~
      # elasticsearch:
      #   host: "http://opensearch-cluster-master.opensearch:9200"
      #   log_id_template: "{dag_id}_{task_id}_{run_id}_{try_number}"
      #   json_format: 'True'
      #   verify_certs: 'False'
      # elasticsearch_configs:
      #   use_ssl: 'False'
      #   verify_certs: 'False'
    # extraEnv: |
    #   - name: AIRFLOW__OPENSEARCH__PORT
    #     value: '9200'
    # ports:
    #   apiServer: 80
    #   airflowUI: 80
    # apiServer:
    #   service:
    #     type: LoadBalancer
    triggerer:
      persistence:
        enabled: false
      podAnnotations:
        secret.reloader.stakater.com/reload: "airflow-connections"
        configmap.reloader.stakater.com/reload: "airflow-variables"
    migrateDatabaseJob:
      useHelmHooks: false
    createUserJob:
      useHelmHooks: false
    data:
      metadataSecretName: airflow-metadata-connection
    images:
      gitSync:
        tag: v4.7.0
    extraEnvFrom: |
      - secretRef:
          name: 'airflow-connections'
      - configMapRef:
          name: 'airflow-variables'
    # Reloader watches these workloads and restarts them automatically when the
    # 'airflow-connections' Secret or 'airflow-variables' ConfigMap changes
    # (env-from-Secret/ConfigMap is not hot-reloaded).
    apiServer:
      podAnnotations:
        secret.reloader.stakater.com/reload: "airflow-connections"
        configmap.reloader.stakater.com/reload: "airflow-variables"
    scheduler:
      podAnnotations:
        secret.reloader.stakater.com/reload: "airflow-connections"
        configmap.reloader.stakater.com/reload: "airflow-variables"
    dagProcessor:
      podAnnotations:
        secret.reloader.stakater.com/reload: "airflow-connections"
        configmap.reloader.stakater.com/reload: "airflow-variables"
    dags:
      gitSync:
        enabled: ${dags_git_sync_enabled}
        credentialsSecret: git-credentials
        repo: ${dags_git_repo}
        branch: ${dags_git_branch}
        ref: ${dags_git_branch}
        subPath: ${dags_git_subpath}
    ingress:
      apiServer:
        enabled: true
        ingressClassName: traefik
        hosts:
          - name: airflow.${domain}
            tls:
              enabled: true
              secretName: airflow-tls
        tls:
          enabled: true
          secretName: airflow-tls
