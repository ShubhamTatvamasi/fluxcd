---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airflow
  namespace: ${namespace}
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: airflow
    namespace: ${namespace}
  values:
    airflowVersion: "3.3.0"
    # defaultAirflowTag: "3.3.0"
    defaultAirflowTag: "3.3.0-1"
    defaultAirflowRepository: "shubhamtatvamasi/airflow"
    executor: "KubernetesExecutor"
    workers:
      kubernetes:
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "2Gi"
    postgresql:
      enabled: false
    opensearch:
      enabled: true
      # Connection URI (scheme://user:pass@host:port) comes from the
      # airflow-opensearch-connection sealed secret instead of being
      # hardcoded here — it must match the real admin password from
      # opensearch-admin-credentials (see infrastructure/base/opensearch),
      # not a placeholder.
      secretName: "airflow-opensearch-connection"
    config:
      core:
        test_connection: 'Enabled'
      webserver:
        expose_config: 'True'
        update_fab_perms: 'True'
      logging:
        delete_local_logs: 'False'
      opensearch:
        host: "https://opensearch-cluster-master.opensearch"
        port: 9200
        write_to_os: 'True'
        json_format: 'True'
        write_stdout: 'False'
      opensearch_configs:
        use_ssl: 'False'
        verify_certs: 'False'
        ssl_assert_hostname: 'False'
      elasticsearch: ~
      elasticsearch_configs: ~
      # elasticsearch:
      #   host: "http://opensearch-cluster-master.opensearch:9200"
      #   log_id_template: "{dag_id}_{task_id}_{run_id}_{try_number}"
      #   json_format: 'True'
      #   verify_certs: 'False'
      # elasticsearch_configs:
      #   use_ssl: 'False'
      #   verify_certs: 'False'
    # The opensearch.secretName/config.opensearch.host above only ever wire up
    # AIRFLOW__OPENSEARCH__HOST (with user:pass embedded in the URL for
    # display/URL-building purposes only) — the actual OpenSearch client
    # built by the log handler authenticates using separate discrete
    # AIRFLOW__OPENSEARCH__USERNAME/PASSWORD env vars, which the chart never
    # sets on its own. Without these, the client connects with empty
    # credentials and every log read/write 401s.
    extraEnv: |
      - name: AIRFLOW__OPENSEARCH__USERNAME
        valueFrom:
          secretKeyRef:
            name: airflow-opensearch-connection
            key: username
      - name: AIRFLOW__OPENSEARCH__PASSWORD
        valueFrom:
          secretKeyRef:
            name: airflow-opensearch-connection
            key: password
    # Pinned so Fernet-encrypted Connections/Variables in the metadata DB stay
    # decryptable across chart upgrades/reinstalls — without this the chart
    # auto-generates a random key per release, and any rotation makes existing
    # encrypted rows permanently undecryptable (InvalidToken). The chart
    # already injects AIRFLOW__CORE__FERNET_KEY on every pod via this secret
    # name, so it must not also be set through extraEnv (duplicate env key).
    fernetKeySecretName: "airflow-fernet-key"
    # ports:
    #   apiServer: 80
    #   airflowUI: 80
    # apiServer:
    #   service:
    #     type: LoadBalancer
    triggerer:
      persistence:
        enabled: false
      podAnnotations:
        secret.reloader.stakater.com/reload: "airflow-connections"
        configmap.reloader.stakater.com/reload: "airflow-variables"
    migrateDatabaseJob:
      useHelmHooks: false
    createUserJob:
      useHelmHooks: false
    data:
      metadataSecretName: airflow-metadata-connection
    images:
      gitSync:
        tag: v4.7.0
    extraEnvFrom: |
      - secretRef:
          name: 'airflow-connections'
      - configMapRef:
          name: 'airflow-variables'
    # Reloader watches these workloads and restarts them automatically when the
    # 'airflow-connections' Secret or 'airflow-variables' ConfigMap changes
    # (env-from-Secret/ConfigMap is not hot-reloaded).
    apiServer:
      podAnnotations:
        secret.reloader.stakater.com/reload: "airflow-connections"
        configmap.reloader.stakater.com/reload: "airflow-variables"
    scheduler:
      podAnnotations:
        secret.reloader.stakater.com/reload: "airflow-connections"
        configmap.reloader.stakater.com/reload: "airflow-variables"
    dagProcessor:
      podAnnotations:
        secret.reloader.stakater.com/reload: "airflow-connections"
        configmap.reloader.stakater.com/reload: "airflow-variables"
    dags:
      gitSync:
        enabled: ${dags_git_sync_enabled}
        credentialsSecret: git-credentials
        repo: ${dags_git_repo}
        branch: ${dags_git_branch}
        ref: ${dags_git_branch}
        subPath: ${dags_git_subpath}
    ingress:
      apiServer:
        enabled: true
        ingressClassName: traefik
        hosts:
          - name: airflow.${domain}
            tls:
              enabled: true
              secretName: airflow-tls
        tls:
          enabled: true
          secretName: airflow-tls
