---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: airflow
  namespace: ${namespace}
spec:
  inputs:
    - service: "airflow-tls"
      path: "./secrets/tls/shubhamtatvamasi-tls"
      tls_secret_name: "airflow-tls"
    - service: "git-credentials"
      path: "./secrets/git-credentials"
    - service: "airflow-config"
      path: "./apps/${cluster}/${namespace}"
    - service: "airflow-metadata-connection"
      path: "./secrets/airflow/airflow-metadata-connection"
    - service: "airflow-opensearch-connection"
      path: "./secrets/airflow/airflow-opensearch-connection"
    - service: "airflow-fernet-key"
      path: "./secrets/airflow/airflow-fernet-key"
    - service: "airflow"
      path: "./infrastructure/base/airflow/airflow"
      dependsOn:
        - "airflow-tls"
        - "git-credentials"
        - "airflow-config"
        - "airflow-metadata-connection"
        - "airflow-opensearch-connection"
        - "airflow-fernet-key"
        - "keda"
      dags_git_sync_enabled: "${dags_git_sync_enabled}"
      dags_git_repo: "${dags_git_repo}"
      dags_git_branch: "${dags_git_branch}"
      dags_git_subpath: "${dags_git_subpath}"
      worker_min_replicas: "${worker_min_replicas}"
      worker_max_replicas: "${worker_max_replicas}"

    - service: "airflow-import"
      path: "./infrastructure/base/airflow/airflow-import"
      dependsOn:
        - "airflow"

    - service: "airflow-monitoring"
      path: "./infrastructure/base/airflow/airflow-monitoring"
      dependsOn:
        - "airflow"
  resourcesTemplate: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: << inputs.service >>
      namespace: ${namespace}
    spec:
      interval: 10m0s
      path: << inputs.path >>
      prune: true
      wait: true
      timeout: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system

      <<- if index inputs "dependsOn" >>
      dependsOn:
        <<- range index inputs "dependsOn" >>
        - name: << . >>
          <<- if eq . "keda" >>
          namespace: flux-system
          <<- end >>
        <<- end >>
      <<- end >>

      postBuild:
        substitute:
          namespace: ${namespace}
          domain: ${domain}

          <<- if index inputs "tls_secret_name" >>
          tls_secret_name: "<< index inputs "tls_secret_name" >>"
          <<- end >>

          <<- if eq inputs.service "airflow" >>
          <<- if index inputs "dags_git_sync_enabled" >>
          dags_git_sync_enabled: "<< index inputs "dags_git_sync_enabled" >>"
          <<- else >>
          dags_git_sync_enabled: "false"
          <<- end >>
          <<- end >>

          <<- if index inputs "dags_git_repo" >>
          dags_git_repo: "<< index inputs "dags_git_repo" >>"
          <<- end >>

          <<- if index inputs "dags_git_branch" >>
          dags_git_branch: "<< index inputs "dags_git_branch" >>"
          <<- end >>

          <<- if index inputs "dags_git_subpath" >>
          dags_git_subpath: "<< index inputs "dags_git_subpath" >>"
          <<- end >>

          <<- if index inputs "worker_min_replicas" >>
          worker_min_replicas: "<< index inputs "worker_min_replicas" >>"
          <<- end >>

          <<- if index inputs "worker_max_replicas" >>
          worker_max_replicas: "<< index inputs "worker_max_replicas" >>"
          <<- end >>
