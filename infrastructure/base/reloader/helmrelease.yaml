---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: reloader
    namespace: reloader
  values:
    reloader:
      # Only restart workloads that opt in via annotations (no cluster-wide auto reload).
      watchGlobally: true
      reloadStrategy: annotations
