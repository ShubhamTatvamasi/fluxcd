---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch-dashboards
  namespace: opensearch
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: opensearch-dashboards
    namespace: opensearch
  values:
    # OpenSearch runs in this same namespace with its security plugin enabled
    # over TLS (see ../opensearch), so Dashboards talks to it over https and
    # authenticates as the admin user, mounting OpenSearch's own node cert
    # secret directly since they're now in the same namespace.
    opensearchHosts: "https://opensearch-cluster-master:9200"
    opensearchAccount:
      secret: opensearch-admin-credentials
    secretMounts:
      - name: opensearch-ca-cert
        secretName: opensearch-node-cert
        path: /usr/share/opensearch-dashboards/config/ca-cert
    config:
      opensearch_dashboards.yml:
        server:
          host: "0.0.0.0"
        opensearch.hosts: ["https://opensearch-cluster-master:9200"]
        opensearch.ssl.certificateAuthorities:
          - /usr/share/opensearch-dashboards/config/ca-cert/ca.crt
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: opensearch.${domain}
          paths:
            # serviceName/servicePort default to the chart's own service+port;
            # the chart's ingress template requires the backend key to be present.
            - path: /
              backend: {}
      tls:
        - secretName: opensearch-dashboards-tls
          hosts:
            - opensearch.${domain}
