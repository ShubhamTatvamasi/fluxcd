---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: opensearch-node
  namespace: opensearch
spec:
  secretName: opensearch-node-cert
  commonName: opensearch-cluster-master
  dnsNames:
    - opensearch-cluster-master
    - opensearch-cluster-master.opensearch
    - opensearch-cluster-master.opensearch.svc
    - opensearch-cluster-master.opensearch.svc.cluster.local
    - localhost
  ipAddresses:
    - 127.0.0.1
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: internal-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
