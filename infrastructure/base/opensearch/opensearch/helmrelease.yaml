---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch
  namespace: opensearch
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: opensearch
    namespace: opensearch
  values:
    singleNode: true
    protocol: https
    # Let the image's built-in demo installer run: it seeds the stock
    # roles/roles_mapping/action_groups/tenants (which already map the
    # "admin" backend role to all_access) and sets the admin user's password
    # from this env var instead of us shipping a custom internal_users.yml.
    extraEnvs:
      - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            name: opensearch-admin-credentials
            key: password
    # Mount the cert-manager-issued node cert (used for both transport and
    # REST TLS) and the admin identity cert (used as the security plugin's
    # super-admin DN) as files inside the pod.
    #
    # NOTE: disabling ssl.http (REST TLS) was considered so clients could use
    # plain HTTP + basic auth, but plugins.security.ssl.http.enabled: false has
    # been an unsupported config since OpenSearch 2.12 (breaks securityadmin.sh
    # / demo security bootstrap) and we're on 3.7.0 — so REST stays on HTTPS;
    # basic auth (id/password from opensearch-admin-credentials) still works
    # the same way over HTTPS.
    secretMounts:
      - name: opensearch-node-cert
        secretName: opensearch-node-cert
        path: /usr/share/opensearch/config/node-cert
      - name: opensearch-admin-cert
        secretName: opensearch-admin-cert
        path: /usr/share/opensearch/config/admin-cert
    config:
      opensearch.yml: |
        cluster.name: opensearch-cluster
        network.host: 0.0.0.0
        plugins:
          security:
            ssl:
              transport:
                pemcert_filepath: node-cert/tls.crt
                pemkey_filepath: node-cert/tls.key
                pemtrustedcas_filepath: node-cert/ca.crt
                enforce_hostname_verification: false
              http:
                enabled: true
                pemcert_filepath: node-cert/tls.crt
                pemkey_filepath: node-cert/tls.key
                pemtrustedcas_filepath: node-cert/ca.crt
            allow_unsafe_democertificates: false
            allow_default_init_securityindex: true
            authcz:
              admin_dn:
                - "CN=opensearch-admin,O=opensearch"
            audit.type: internal_opensearch
            enable_snapshot_restore_privilege: true
            check_snapshot_restore_write_privileges: true
            restapi:
              roles_enabled: ["all_access", "security_rest_api_access"]
