---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: airflow-basic-auth
  namespace: cnpg-system
spec:
  dependsOn:
  - name: sealed-secrets
    namespace: flux-system
  force: false
  interval: 10m0s
  path: ./secrets/airflow/cnpg-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 10m
  wait: true
