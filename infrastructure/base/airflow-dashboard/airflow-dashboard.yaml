apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  airflow-dashboard.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "annotations": {
        "list": []
      },
      "description": "Monitor Apache Airflow across multiple namespaces via StatsD Exporter",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "DAG Processing Import Errors",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(airflow_dag_processing_import_errors{namespace=~\"$namespace\"})",
              "legendFormat": "Import Errors"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "DAGBag Size",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(airflow_dagbag_size{namespace=~\"$namespace\"})",
              "legendFormat": "DAGs"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "Running DAG Runs",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(airflow_scheduler_dagruns_running{namespace=~\"$namespace\"})",
              "legendFormat": "Running"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "Running Tasks",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(airflow_executor_running_tasks{namespace=~\"$namespace\"})",
              "legendFormat": "Running Tasks"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "Queued Tasks",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(airflow_executor_queued_tasks{namespace=~\"$namespace\"})",
              "legendFormat": "Queued Tasks"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 6,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "Executor Open Slots",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(airflow_executor_open_slots{namespace=~\"$namespace\"})",
              "legendFormat": "Open Slots"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "Scheduler Health",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 10,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "title": "Scheduler Loop Duration (p50/p90/p99)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_scheduler_scheduler_loop_duration{quantile=\"0.5\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p50"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_scheduler_scheduler_loop_duration{quantile=\"0.9\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p90"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_scheduler_scheduler_loop_duration{quantile=\"0.99\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p99"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 11,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "title": "Scheduler Critical Section Duration (p50/p90/p99)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_scheduler_critical_section_duration{quantile=\"0.5\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p50"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_scheduler_critical_section_duration{quantile=\"0.9\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p90"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_scheduler_critical_section_duration{quantile=\"0.99\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p99"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "id": 12,
          "options": { "legend": { "calcs": ["mean", "last"], "displayMode": "table", "placement": "bottom" } },
          "title": "Scheduler Heartbeat Rate",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "rate(airflow_scheduler_heartbeat{namespace=~\"$namespace\"}[5m])",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "id": 13,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "title": "Scheduler Critical Section Query Duration (p50/p90/p99)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_scheduler_critical_section_query_duration{quantile=\"0.5\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p50"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_scheduler_critical_section_query_duration{quantile=\"0.9\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p90"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_scheduler_critical_section_query_duration{quantile=\"0.99\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p99"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 22 },
          "id": 102,
          "title": "DAG Processing",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 23 },
          "id": 20,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "title": "DAG Processing Last Duration (p50/p90/p99)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_dag_processing_last_duration{quantile=\"0.5\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p50"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_dag_processing_last_duration{quantile=\"0.9\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p90"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_dag_processing_last_duration{quantile=\"0.99\",namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} p99"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 23 },
          "id": 21,
          "options": { "legend": { "calcs": ["last"], "displayMode": "table", "placement": "bottom" } },
          "title": "Seconds Since Last DAG File Processing",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_dag_processing_last_run_seconds_ago{namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} / {{dag_file}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 31 },
          "id": 22,
          "options": { "legend": { "calcs": ["last"], "displayMode": "table", "placement": "bottom" } },
          "title": "DAG Processing Total Parse Time",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_dag_processing_total_parse_time{namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 31 },
          "id": 23,
          "options": { "legend": { "calcs": ["last"], "displayMode": "table", "placement": "bottom" } },
          "title": "DAG Processing Import Errors",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_dag_processing_import_errors{namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 39 },
          "id": 103,
          "title": "DAG Run Performance",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 40 },
          "id": 30,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "title": "DAG Run Duration by DAG",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_dagrun_duration_sum{namespace=~\"$namespace\",dag_id=~\"$dag_id\"} / airflow_dagrun_duration_count{namespace=~\"$namespace\",dag_id=~\"$dag_id\"}",
              "legendFormat": "{{namespace}} / {{dag_id}} avg"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 40 },
          "id": 31,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "title": "DAG Run Schedule Delay by DAG",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_dagrun_schedule_delay_sum{namespace=~\"$namespace\",dag_id=~\"$dag_id\"} / airflow_dagrun_schedule_delay_count{namespace=~\"$namespace\",dag_id=~\"$dag_id\"}",
              "legendFormat": "{{namespace}} / {{dag_id}} avg delay"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 48 },
          "id": 32,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "title": "DAG Run First Task Scheduling Delay",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_dagrun_first_task_scheduling_delay_sum{namespace=~\"$namespace\"} / airflow_dagrun_first_task_scheduling_delay_count{namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} avg"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 48 },
          "id": 33,
          "options": { "legend": { "calcs": ["mean", "last"], "displayMode": "table", "placement": "bottom" } },
          "title": "DAG Run Dependency Check Rate",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "rate(airflow_dagrun_dependency_check_count{namespace=~\"$namespace\"}[5m])",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 56 },
          "id": 104,
          "title": "Task Performance",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 57 },
          "id": 40,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "title": "Task Duration by DAG / Task",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_task_duration_sum{namespace=~\"$namespace\",dag_id=~\"$dag_id\"} / airflow_task_duration_count{namespace=~\"$namespace\",dag_id=~\"$dag_id\"}",
              "legendFormat": "{{namespace}} / {{dag_id}} / {{task_id}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 57 },
          "id": 41,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "title": "Task Scheduled Duration",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "airflow_task_scheduled_duration_sum{namespace=~\"$namespace\"} / airflow_task_scheduled_duration_count{namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}} avg scheduled duration"
            }
          ]
        },
