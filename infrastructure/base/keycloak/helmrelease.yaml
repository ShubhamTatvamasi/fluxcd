---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: keycloak
    namespace: keycloak
  values:
    keycloak:
      adminPassword: admin
      hostname: https://keycloak.${domain}
      proxyHeaders: xforwarded
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: keycloak.${domain}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: keycloak-tls
          hosts:
            - keycloak.${domain}
