---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: vault
    namespace: vault
  values:
    server:
      dev:
        enabled: false
      dataStorage:
        enabled: true
        size: 10Gi
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - host: vault.${domain}
            paths: []
        tls:
          - secretName: vault-tls
            hosts:
              - vault.${domain}
      volumes:
        - name: unsealer-script
          configMap:
            name: vault-unsealer-script
            defaultMode: 0755
      extraContainers:
        - name: unsealer
          image: hashicorp/vault:2.0.3
          command: ["/bin/sh", "/scripts/unseal.sh"]
          volumeMounts:
            - name: unsealer-script
              mountPath: /scripts
    ui:
      enabled: true
