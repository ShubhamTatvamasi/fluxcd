---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: vault
    namespace: vault
  values:
    server:
      dev:
        enabled: false
      dataStorage:
        enabled: true
        size: 10Gi
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - host: vault.${domain}
            paths: []
        tls:
          - secretName: vault-tls
            hosts:
              - vault.${domain}
    ui:
      enabled: true
