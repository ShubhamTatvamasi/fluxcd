---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-unsealer-script
  namespace: vault
data:
  unseal.sh: |
    #!/bin/sh
    set -eu

    export VAULT_ADDR="http://127.0.0.1:8200"
    TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
    NS="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
    SECRET_URL="https://kubernetes.default.svc/api/v1/namespaces/$NS/secrets/vault-init-keys"

    wget_k8s() { wget -qO- --no-check-certificate --header "Authorization: Bearer $TOKEN" "$@"; }
    # scalar field, e.g. "key": "value" or "key": true - one line, Vault/k8s json is pretty-printed
    json_scalar() { grep "\"$1\":" | sed -E 's/.*"'"$1"'":[[:space:]]*"?([^",}]*)"?.*/\1/' | head -n1; }
    # array of strings, e.g. "key": [ "a", "b" ] spanning multiple lines
    json_array() { sed -n "/\"$1\":/,/]/p" | grep -o '"[^"]*"' | sed '1d'; }

    STATUS=""
    until [ -n "$STATUS" ]; do
      STATUS="$(vault status -format=json 2>/dev/null || true)"
      [ -z "$STATUS" ] && sleep 5
    done

    if [ "$(echo "$STATUS" | json_scalar initialized)" != "true" ]; then
      INIT="$(vault operator init -key-shares=5 -key-threshold=3 -format=json)"
      TOKEN_B64="$(echo "$INIT" | json_scalar root_token | base64 | tr -d '\n')"
      KEYS_B64="$(echo "$INIT" | json_array unseal_keys_b64 | base64 | tr -d '\n')"
      wget_k8s --header "Content-Type: application/json" \
        --post-data '{"apiVersion":"v1","kind":"Secret","metadata":{"name":"vault-init-keys"},"data":{"root_token":"'"$TOKEN_B64"'","unseal_keys_b64":"'"$KEYS_B64"'"}}' \
        "https://kubernetes.default.svc/api/v1/namespaces/$NS/secrets" >/dev/null
      STATUS="$(vault status -format=json 2>/dev/null || true)"
    fi

    if [ "$(echo "$STATUS" | json_scalar sealed)" = "true" ]; then
      wget_k8s "$SECRET_URL" | json_scalar unseal_keys_b64 | base64 -d | tr -d '"' |
        head -n3 | while IFS= read -r key; do vault operator unseal "$key" >/dev/null; done
    fi
