---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
  namespace: openebs
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: openebs
    namespace: openebs
  values:
    openebs-crds:
      csi:
        volumeSnapshots:
          enabled: false
    alloy:
      enabled: false
    loki:
      enabled: false
    localpv-provisioner:
      hostpathClass:
        isDefaultClass: true
    engines:
      local:
        lvm:
          enabled: false
        zfs:
          enabled: false
      replicated:
        mayastor:
          enabled: false
