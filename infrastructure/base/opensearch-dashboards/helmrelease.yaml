---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch-dashboards
  namespace: opensearch-dashboards
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: opensearch-dashboards
    namespace: opensearch-dashboards
  values:
    # OpenSearch runs in the `opensearch` namespace with the security plugin
    # disabled and plain http (see infrastructure/base/opensearch), so point
    # the dashboards at the cross-namespace service over http.
    opensearchHosts: "http://opensearch-cluster-master.opensearch:9200"
    # The backend has no security plugin, so Dashboards' own security plugin has
    # nothing to authenticate against and renders a login page that nobody can
    # pass. Remove the plugin at startup so the UI loads with no auth.
    plugins:
      enabled: true
      removeList:
        - securityDashboards
    config:
      opensearch_dashboards.yml:
        server:
          host: "0.0.0.0"
        opensearch.hosts: ["http://opensearch-cluster-master.opensearch:9200"]
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: opensearch.${domain}
          paths:
            # serviceName/servicePort default to the chart's own service+port;
            # the chart's ingress template requires the backend key to be present.
            - path: /
              backend: {}
      tls:
        - secretName: opensearch-dashboards-tls
          hosts:
            - opensearch.${domain}
