---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: opensearch-ca-bundle
  namespace: opensearch-dashboards
spec:
  secretName: opensearch-node-cert
  commonName: opensearch-dashboards-ca-bundle
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: internal-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
