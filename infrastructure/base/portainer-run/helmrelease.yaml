---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer-run
  namespace: portainer-run
spec:
  interval: 10m
  chartRef:
    kind: HelmChart
    name: portainer-run
    namespace: portainer-run
  values:
    config:
      PORTAINER_URL: "https://portainer.portainer.svc.cluster.local:9443"
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: portainer-run.${domain}
          paths:
            - path: /
      tls:
        - secretName: portainer-run-tls
          hosts:
            - portainer-run.${domain}
