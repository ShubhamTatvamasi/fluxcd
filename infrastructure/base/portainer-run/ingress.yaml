---
# The pod serves a self-signed cert on :443 and redirects :80 → :443, so
# Traefik reaches the backend over HTTPS via the serverstransport in
# serverstransport.yaml (insecureSkipVerify for the self-signed backend cert).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portainer-run
  namespace: portainer-run
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: portainer-run-portainer-run@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - secretName: portainer-run-tls
      hosts:
        - portainer-run.k8s.shubhamtatvamasi.com
  rules:
    - host: portainer-run.k8s.shubhamtatvamasi.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portainer-run
                port:
                  number: 443
