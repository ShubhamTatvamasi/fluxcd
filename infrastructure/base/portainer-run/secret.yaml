---
# Secret — sensitive values for Portainer Run.
#
# Populate ENCRYPTION_KEY (required) and an AI provider key before this is of
# use. Fill the values in the cluster rather than committing them here:
#
#   # required — encrypts stored Git target credentials at rest (min 32 chars)
#   kubectl create secret generic portainer-run-secret -n portainer-run \
#     --from-literal=ENCRYPTION_KEY="$(openssl rand -hex 32)" \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-..." \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# This stub keeps the keys present (empty) so the Deployment's envFrom/secretKeyRef
# references resolve. Reloader restarts the pod when the secret is updated.
apiVersion: v1
kind: Secret
metadata:
  name: portainer-run-secret
  namespace: portainer-run
type: Opaque
stringData:
  ENCRYPTION_KEY: ""
  ANTHROPIC_API_KEY: ""
