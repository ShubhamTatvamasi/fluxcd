---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao
  namespace: openbao
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao
  namespace: openbao
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "patch", "update"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao
  namespace: openbao
subjects:
- kind: ServiceAccount
  name: openbao
  namespace: openbao
roleRef:
  kind: Role
  name: openbao
  apiGroup: rbac.authorization.k8s.io
