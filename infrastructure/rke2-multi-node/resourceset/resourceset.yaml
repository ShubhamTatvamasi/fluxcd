---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  inputs:
    # infrastructure
    - service: "metallb"
      path: "./infrastructure/base/metallb"

    # storage controllers
    - service: "longhorn"
      path: "./infrastructure/base/longhorn"

    # Sealed Secrets controller (needs to be installed before any sealed secrets can be decrypted)
    - service: "sealed-secrets"
      path: "./infrastructure/base/sealed-secrets"

    # flux web UI TLS (sealed secret decrypted by sealed-secrets)
    - service: "flux-tls"
      path: "./secrets/tls/shubhamtatvamasi-tls"
      tls_secret_name: "flux-tls"
      namespace: "flux-system"
      dependsOn:
        - "sealed-secrets"

    # metallb config (needs the metallb controller CRDs first)
    - service: "metallb-config"
      path: "./infrastructure/rke2-multi-node/metallb-system"
      dependsOn:
        - "metallb"

    # Gateway API (needs traefik to be installed first)
    - service: "gateway-api"
      path: "./infrastructure/base/gateway-api"

    # Traefik — ingress controller (needs metallb and sealed-secrets to be installed first)
    - service: "traefik"
      path: "./infrastructure/base/traefik"
      dependsOn:
        - "metallb-config"
        - "sealed-secrets"
        - "gateway-api"

    # Portainer — container management UI (needs traefik and openebs to be installed first)
    - service: "portainer"
      path: "./infrastructure/base/portainer"
      dependsOn:
        - "traefik"
        - "openebs"
        - "sealed-secrets"

    # portainer-run (needs portainer to be installed first)
    - service: "portainer-run"
      path: "./infrastructure/base/portainer-run"
      dependsOn:
        - "portainer"
        - "traefik"
        - "openebs"
        - "sealed-secrets"

    # Rancher — cluster management UI
    - service: "rancher"
      path: "./infrastructure/base/rancher"
      dependsOn:
        - "traefik"
        - "sealed-secrets"
  resourcesTemplate: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: << inputs.service >>
      namespace: flux-system
    spec:
      interval: 10m0s
      path: << inputs.path >>
      prune: true
      wait: true
      timeout: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system

      <<- if index inputs "dependsOn" >>
      dependsOn:
        <<- range index inputs "dependsOn" >>
        - name: << . >>
        <<- end >>
      <<- end >>

      postBuild:
        substitute:
          domain: "${domain}"
          <<- if index inputs "tls_secret_name" >>
          tls_secret_name: "<< index inputs "tls_secret_name" >>"
          namespace: "<< index inputs "namespace" >>"
          <<- end >>
