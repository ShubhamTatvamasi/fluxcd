---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: shubhamtatvamasi-tls
  namespace: flux-system
spec:
  inputs:
    - namespace: "flux-system"
    - namespace: "dex"
    - namespace: "harbor"
    - namespace: "portainer"
    # - namespace: "monitoring"
    # - namespace: "gitea"
    # - namespace: "airflow"
  resourcesTemplate: |
    ---
    apiVersion: v1
    kind: Namespace
    metadata:
      name: << inputs.namespace >>
    ---
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: shubhamtatvamasi-tls
      namespace: << inputs.namespace >>
    spec:
      interval: 10m0s
      path: ./secrets/base/shubhamtatvamasi-tls
      prune: true
      wait: true
      timeout: 10m
      targetNamespace: << inputs.namespace >>
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      postBuild:
        substitute:
          namespace: << inputs.namespace >>
