---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-tls
  namespace: flux-system
spec:
  dependsOn:
  - name: controllers
    namespace: flux-system
  force: false
  interval: 10m0s
  path: ./secrets/base/shubhamtatvamasi-tls
  postBuild:
    substitute:
      tls_secret_name: flux-tls
      namespace: flux-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 10m
  wait: true
