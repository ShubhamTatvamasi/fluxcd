---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  inputs:
    # metallb provides load balancer services for the cluster
    - service: "metallb"
      path: "./infrastructure/base/metallb"

    # OpenEBS provides persistent storage for the cluster
    - service: "openebs"
      path: "./infrastructure/base/openebs"

    # sealed-secrets encrypts secrets so they can be stored in Git safely
    - service: "sealed-secrets"
      path: "./infrastructure/base/sealed-secrets"

    # reloader watches for changes in ConfigMaps and Secrets and reloads the pods that use them
    - service: "reloader"
      path: "./infrastructure/base/reloader"

    # flux web UI TLS (sealed secret decrypted by sealed-secrets)
    - service: "flux-tls"
      path: "./secrets/tls/shubhamtatvamasi-tls"
      tls_secret_name: "flux-tls"
      namespace: "flux-system"
      dependsOn:
        - "sealed-secrets"

    # metallb config (needs the metallb controller CRDs first)
    - service: "metallb-config"
      path: "./infrastructure/rke2/metallb-system"
      dependsOn:
        - "metallb"

    # gateway-api CRDs (needs the metallb config first)
    - service: "gateway-api"
      path: "./infrastructure/base/gateway-api"

    # traefik ingress controller (needs the metallb config first)
    - service: "traefik"
      path: "./infrastructure/base/traefik/controller"
      dependsOn:
        - "metallb-config"
        - "sealed-secrets"
        - "gateway-api"

    # traefik IngressRoute/Middleware CRs (need the traefik.io CRDs installed by the HelmRelease first)
    - service: "traefik-routes"
      path: "./infrastructure/base/traefik/routes"
      dependsOn:
        - "traefik"

    # harbor container registry (needs traefik, openebs, and sealed-secrets)
    - service: "harbor"
      path: "./infrastructure/base/harbor"
      dependsOn:
        - "traefik"
        - "openebs"
        - "sealed-secrets"

    # dex OIDC provider (needs traefik and sealed-secrets)
    - service: "dex"
      path: "./infrastructure/base/dex"
      dependsOn:
        - "traefik"
        - "sealed-secrets"

    # oauth2-proxy needs dex to be up first, so it can configure the OIDC provider
    - service: "oauth2-proxy"
      path: "./infrastructure/base/oauth2-proxy"
      dependsOn:
        - "dex"

    # portainer is a web UI for managing containers and Kubernetes clusters (needs traefik, openebs, and sealed-secrets)
    - service: "portainer"
      path: "./infrastructure/base/portainer"
      dependsOn:
        - "traefik"
        - "openebs"
        - "sealed-secrets"

    # portainer-run is a companion to portainer that runs the portainer agent on each node, so that portainer can manage the nodes and containers.
    - service: "portainer-run"
      path: "./infrastructure/base/portainer-run"
      dependsOn:
        - "traefik"
        - "openebs"
        - "sealed-secrets"

    # kube-prometheus-stack provides monitoring and alerting for the cluster (needs traefik, openebs, and sealed-secrets)
    - service: "kube-prometheus-stack"
      path: "./infrastructure/base/kube-prometheus-stack"
      dependsOn:
        - "traefik"
        - "openebs"
        - "sealed-secrets"

    # traefik's ServiceMonitor (needs the monitoring.coreos.com CRDs from kube-prometheus-stack,
    # which itself depends on traefik — so this can't live in the traefik HelmRelease values)
    - service: "traefik-monitoring"
      path: "./infrastructure/base/traefik/monitoring"
      dependsOn:
        - "traefik"
        - "kube-prometheus-stack"

    # mimir is a time series database that stores metrics from the cluster and makes them available in Grafana (needs traefik, openebs, and sealed-secrets)
    - service: "mimir"
      path: "./infrastructure/base/mimir"
      dependsOn:
        - "kube-prometheus-stack"
        - "openebs"

    # Loki is a log aggregation system that stores logs from the cluster and makes them available in Grafana (needs traefik, openebs, and sealed-secrets)
    - service: "loki"
      path: "./infrastructure/base/loki"
      dependsOn:
        - "kube-prometheus-stack"
        - "openebs"

    # alloy ships pod logs into Loki (needs traefik, openebs, and sealed-secrets)
    - service: "alloy"
      path: "./infrastructure/base/alloy"
      dependsOn:
        - "loki"

    # gitea is a self-hosted Git service (needs traefik, openebs, and sealed-secrets)
    # - service: "gitea"
    #   path: "./infrastructure/base/gitea"
    #   dependsOn:
    #     - "traefik"
    #     - "openebs"
    #     - "sealed-secrets"

    # Keycloak is an identity and access management solution (needs traefik and sealed-secrets)
    - service: "keycloak"
      path: "./infrastructure/base/keycloak"
      dependsOn:
        - "traefik"
        - "sealed-secrets"

    # Rancher — cluster management UI
    - service: "rancher"
      path: "./infrastructure/base/rancher"
      dependsOn:
        - "traefik"
        - "sealed-secrets"

    # StackGres — Postgres operator with web console (needs traefik and sealed-secrets)
    - service: "stackgres-operator"
      path: "./infrastructure/base/stackgres/operator"
      dependsOn:
        - "traefik"
        - "sealed-secrets"

    # Teleport — zero-trust access proxy for SSH, Kubernetes, and web apps
    - service: "teleport-cluster"
      path: "./infrastructure/base/teleport/cluster"
      dependsOn:
        - "metallb-config"
        - "sealed-secrets"

    # Teleport config — custom resources (TeleportRole etc.) that require the operator CRDs to exist first
    - service: "teleport-config"
      path: "./infrastructure/base/teleport/config"
      dependsOn:
        - "teleport-cluster"

    # CloudBeaver — web-based database management UI (needs traefik and sealed-secrets)
    - service: "cloudbeaver"
      path: "./infrastructure/base/cloudbeaver"
      dependsOn:
        - "traefik"
        - "sealed-secrets"
  resourcesTemplate: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: << inputs.service >>
      namespace: flux-system
    spec:
      interval: 10m0s
      path: << inputs.path >>
      prune: true
      wait: true
      timeout: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system

      <<- if index inputs "dependsOn" >>
      dependsOn:
        <<- range index inputs "dependsOn" >>
        - name: << . >>
        <<- end >>
      <<- end >>

      postBuild:
        substitute:
          domain: "${domain}"
          <<- if index inputs "tls_secret_name" >>
          tls_secret_name: "<< index inputs "tls_secret_name" >>"
          namespace: "<< index inputs "namespace" >>"
          <<- end >>
